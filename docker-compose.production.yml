version: '3.8'

services:
  vfs-automation:
    image: ghcr.io/vfs-automation:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - DEBUG=false
      - DATABASE_URL=postgres://vfs:secure123@db:5432/vfs
      - REDIS_URL=redis://redis:6379/0
      - TELEGRAM_TOKEN=from_env
    depends_on:
      - db
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      replicas: 3
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: '2.0'
          memory: 512M
        reservations:
          cpus: '1.0'
          memory: 256M

  db:
    image: postgres:15
    container_name: vfs-db-prod
    restart: unless-stopped
    environment:
      - POSTGRES_DB=vfs
      - POSTGRES_USER=vfs
      - POSTGRES_PASSWORD_FILE=/run/secrets/db_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vfs"]
      interval: 10s
      timeout: 5s
    secrets:
      - db_password

  redis:
    image: redis:7-alpine
    container_name: vfs-redis-prod
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

secrets:
  db_password:
    file: ./secrets/db_password.txt

volumes:
  postgres_data:
  redis_data:

# VFS Global Automation Configuration
vfs_global:
  urls:
    base: "https://visa.vfsglobal.com/tur/tr/"
    login: "https://visa.vfsglobal.com/tur/tr/fra/login"
    api_base: "https://lift-api.vfsglobal.com"
  
  credentials:
    email: "{{VFS_EMAIL}}"
    password: "{{VFS_PASSWORD}}"
    phone: "{{VFS_PHONE}}"

  polling:
    interval_seconds: 300
    max_retries: 5

  stealth:
    enabled: true
    user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"

  browser:
    headless: true
    viewport: {"width": 1920, "height": 1080}

  timeouts:
    cloudflare: 45000
    content_await: 60000
    form_fill: 10000
    otp_poll: 300
  
  retry:
    max_retries: 3
    delay_seconds: 5

  selectors:
    cf_iframe: "iframe[src*='challenges/']"
    email_input: "input[type='text'], input[type='email']"
    password_input: "input[type='password']"
    login_button: 'button:has-text("Giriş Yap"), button[type="submit"]'
    otp_trigger: 'button:has-text("Gönder"), button:has-text("Send OTP")'
